name: Dead Man's Switch

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight UTC

permissions:
  contents: write

jobs:
  check-staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check last bulletin date
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'src/content/bulletins';
            const files = fs.readdirSync(path).filter(f => f.endsWith('.md'));
            
            if (files.length === 0) {
              console.log('No bulletins found');
              return;
            }
            
            const dates = files.map(f => f.substring(0, 10)).sort().reverse();
            const lastDate = new Date(dates[0]);
            const now = new Date();
            const daysSince = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
            
            const staleStatus = { stale: daysSince > 14, lastBulletinDate: dates[0] };
            fs.writeFileSync('src/data/stale-status.json', JSON.stringify(staleStatus, null, 2));
            console.log(`Days since last bulletin: ${daysSince}, stale: ${staleStatus.stale}`);
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/stale-status.json
          git diff --cached --quiet || git commit -m "Update stale status"
          git push
